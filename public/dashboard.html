<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CreativeGroup 経営ダッシュボード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ローディングバー -->
  <div id="loading-bar" class="loading-bar" style="display:none"></div>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">CG</span>
        <span class="logo-text">CreativeGroup</span>
        <span class="logo-sub">経営ダッシュボード</span>
      </div>
      <div class="header-right">
        <span id="today-date" class="today-date"></span>
        <a href="/classify.html" class="classify-btn">チーム分類設定</a>
        <a href="/auth/logout" class="logout-btn">ログアウト</a>
      </div>
    </div>
  </header>

  <!-- エラーメッセージ -->
  <div id="error-msg" class="error-banner" style="display:none"></div>

  <!-- タブナビ -->
  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab active" onclick="switchTab(this,'overview')">概要</button>
      <button class="tab" onclick="switchTab(this,'teams')">チーム別売上</button>
      <button class="tab" onclick="switchTab(this,'unpaid')">未入金</button>
      <button class="tab" onclick="switchTab(this,'clients')">クライアント</button>
    </div>
  </nav>

  <main class="main">

    <!-- ── 概要タブ ── -->
    <section id="tab-overview">

      <!-- KPIカード -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">当月売上</div>
          <div class="kpi-value">¥<span id="kpi-revenue">—</span>M</div>
          <div id="kpi-revenue-change" class="kpi-change">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">未入金合計</div>
          <div class="kpi-value kpi-danger">¥<span id="kpi-unpaid">—</span>M</div>
          <div class="kpi-change">現在の未入金残高</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">年間累計売上</div>
          <div class="kpi-value">¥<span id="kpi-annual">—</span>M</div>
          <div class="kpi-change">直近12ヶ月</div>
        </div>
      </div>

      <!-- 売上推移グラフ -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">売上推移（直近12ヶ月）</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>

    </section>

    <!-- ── チーム別売上タブ ── -->
    <section id="tab-teams" style="display:none">

      <!-- 期間セレクター -->
      <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:14px;gap:8px">
        <span style="font-size:12px;color:#888">期間：</span>
        <select id="team-period" onchange="loadTeamSummary()" style="padding:5px 10px;border-radius:6px;border:1px solid #d5d3cc;font-size:13px;font-family:inherit">
          <option value="1">今月</option>
          <option value="3">直近3ヶ月</option>
          <option value="6">直近6ヶ月</option>
          <option value="12">直近12ヶ月</option>
        </select>
      </div>

      <!-- チーム別 -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <h2 class="card-title">チーム別売上</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="teamChart"></canvas>
        </div>
      </div>
      <div id="team-cards" class="team-cards-grid" style="margin-bottom:24px">
        <p class="muted-text">読み込み中…</p>
      </div>

      <!-- サービス別 -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <h2 class="card-title">サービス別売上</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="serviceChart"></canvas>
        </div>
      </div>
      <div id="service-cards" class="team-cards-grid" style="margin-bottom:24px">
        <p class="muted-text">読み込み中…</p>
      </div>

      <!-- 契約形態別 -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <h2 class="card-title">契約形態別売上（単発 vs サブスク）</h2>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 0 8px">
          <div class="chart-wrap" style="max-height:260px">
            <canvas id="contractChart"></canvas>
          </div>
          <div id="contract-cards" style="display:flex;flex-direction:column;gap:12px;justify-content:center">
            <p class="muted-text">読み込み中…</p>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:4px">
        <p style="font-size:13px;color:#888;padding:16px 0;line-height:1.7">
          未分類の取引先がある場合は、<a href="/classify.html" style="color:#2c6e9e">チーム分類設定</a>から担当チーム・サービス・契約形態を割り当ててください。
        </p>
      </div>

    </section>

    <!-- ── 未入金タブ ── -->
    <section id="tab-unpaid" style="display:none">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">未入金リスト</h2>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>クライアント</th>
                <th>件名</th>
                <th>金額</th>
                <th>支払期日</th>
                <th>ステータス</th>
              </tr>
            </thead>
            <tbody id="unpaid-tbody">
              <tr><td colspan="5" class="loading-cell">読み込み中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ── クライアントタブ ── -->
    <section id="tab-clients" style="display:none">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">クライアント別収益（今月）</h2>
        </div>
        <div id="client-grid" class="client-grid">
          <p class="muted-text">読み込み中…</p>
        </div>
      </div>
    </section>

  </main>

  <!-- データ更新ボタン -->
  <button class="fab" onclick="loadAllData()" title="データを更新">↻</button>

  <script src="/dashboard.js"></script>
</body>
</html>
